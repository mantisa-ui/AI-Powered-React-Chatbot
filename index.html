<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>AI Chatbot — Powered by Groq & React</title>
    <meta name="title" content="AI Chatbot — Powered by Groq & React" />
    <meta name="description" content="A modern AI chatbot built with React 19, TypeScript, and Material UI. Features multi-conversation support, dark mode, markdown rendering, and real-time AI responses." />
    <meta name="author" content="Mantisa Debata" />
    <meta name="keywords" content="AI chatbot, React, TypeScript, OpenAI, Groq, ChatGPT, Material UI, Frontend Engineer" />
    
    <!-- Theme Color (matches your gradient!) -->
    <meta name="theme-color" content="#6366F1" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-app.vercel.app/" />
    <meta property="og:title" content="AI Chatbot — Powered by Groq & React" />
    <meta property="og:description" content="A modern AI chatbot built with React 19, TypeScript, and Material UI. Try it live!" />
    <meta property="og:image" content="https://your-app.vercel.app/preview.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://your-app.vercel.app/" />
    <meta property="twitter:title" content="AI Chatbot — Powered by Groq & React" />
    <meta property="twitter:description" content="A modern AI chatbot built with React 19, TypeScript, and Material UI. Try it live!" />
    <meta property="twitter:image" content="https://your-app.vercel.app/preview.png" />
    
    <!-- Preload Fonts (Performance!) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>

</html>
